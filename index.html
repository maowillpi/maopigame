<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎰 MAO转盘游戏</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <style>
        .wheel {
            background: conic-gradient(
                from 0deg,
                #FF6B9D 0deg 208.8deg,    /* 谢谢惠顾 58% */
                #4ECDC4 208.8deg 288deg,  /* 小奖 22% */
                #45B7D1 288deg 331.2deg, /* 中奖 12% */
                #96CEB4 331.2deg 352.8deg, /* 大奖 6% */
                #FFEAA7 352.8deg 358.2deg, /* 超级大奖 1.5% */
                #DDA0DD 358.2deg 360deg  /* 终极大奖 0.5% */
            );
            border: 6px solid #FFD700;
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.6);
        }
        
        .spin-btn {
            background: radial-gradient(circle, #FFD700, #FFA500);
            border: 3px solid white;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
            -webkit-tap-highlight-color: transparent;
        }
        
        .spin-btn:hover:not(:disabled), .spin-btn:active:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 215, 0, 0.8);
        }
        
        .spin-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 移动端优化 */
        .mobile-optimized {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .game-container {
            min-height: 40vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }
        
        .wheel-container {
            position: relative;
            margin-bottom: 15px;
        }

        /* 连接状态指示器 */
        .connection-indicator {
            position: fixed;
            top: 15px;
            right: 15px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #ef4444;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .connection-indicator.connected {
            background-color: #22c55e;
            box-shadow: 0 0 8px rgba(34, 197, 94, 0.5);
        }

        /* 移动端按钮优化 */
        .mobile-btn {
            min-height: 44px;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        /* 防止移动端缩放 */
        * {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        input, textarea {
            -webkit-user-select: text;
            -khtml-user-select: text;
            -moz-user-select: text;
            -ms-user-select: text;
            user-select: text;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-purple-900 via-blue-900 to-indigo-900 mobile-optimized">
    <div class="container mx-auto px-3 py-2 max-w-sm relative flex-1">
        
        <!-- 连接状态指示器 -->
        <div id="connectionIndicator" class="connection-indicator" title="连接状态"></div>
        
        <!-- 标题 -->
        <div class="text-center mb-3">
            <h1 class="text-xl font-bold text-white mb-1">🎰 MAO转盘游戏</h1>
            <p class="text-blue-200 text-xs">手机专用版 - 流畅游戏</p>
        </div>

        <!-- 连接钱包 -->
        <div id="walletConnect" class="bg-white/10 rounded-xl p-3 mb-3">
            <div class="text-center">
                <button id="connectBtn" onclick="connectWallet()" class="mobile-btn w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl">
                    🔗 连接钱包开始游戏
                </button>
                <p class="text-blue-200 text-xs mt-2">支持TP钱包、Trust Wallet等</p>
            </div>
        </div>

        <!-- 游戏区域 -->
        <div id="gameArea" style="display:none;" class="flex-1">
            
            <!-- 代币选择 -->
            <div class="bg-white/10 rounded-xl p-3 mb-2">
                <h3 class="text-white font-bold text-center mb-2 text-sm">🎯 选择代币</h3>
                <div class="flex gap-2">
                    <button id="maoBtn" onclick="selectToken('MAO')" class="mobile-btn flex-1 bg-blue-600 text-white py-2 rounded-lg font-bold text-sm">
                        MAO (100)
                    </button>
                    <button id="piBtn" onclick="selectToken('PI')" class="mobile-btn flex-1 bg-gray-600 text-white py-2 rounded-lg font-bold text-sm">
                        PI (10,000)
                    </button>
                </div>
            </div>

            <!-- 授权区域 - 可隐藏 -->
            <div id="approvalSection" class="bg-white/10 rounded-xl p-3 mb-2">
                <button id="approveBtn" onclick="approve()" class="mobile-btn w-full bg-orange-600 hover:bg-orange-700 text-white font-bold py-2 rounded-xl text-sm">
                    🔓 授权 MAO
                </button>
            </div>

            <!-- 转盘游戏 - 手机优化版 -->
            <div class="bg-white/10 rounded-xl p-2 flex-1">
                <div class="game-container">
                    <div class="wheel-container">
                        <div id="wheel" class="w-48 h-48 rounded-full wheel mx-auto relative">
                            <!-- 指针 -->
                            <div class="absolute top-0 left-1/2 transform -translate-x-1/2 -translate-y-2">
                                <div class="w-0 h-0 border-l-3 border-r-3 border-b-6 border-transparent border-b-yellow-400"></div>
                            </div>
                            <!-- 中心 -->
                            <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-16 h-16 bg-white rounded-full flex items-center justify-center font-bold text-lg">
                                MAO
                            </div>
                        </div>
                    </div>
                        
                    <!-- 游戏按钮 - 手机优化 -->
                    <div class="text-center mb-2">
                        <button id="spinBtn" onclick="spin()" disabled class="spin-btn w-20 h-20 rounded-full text-white font-bold disabled:opacity-50 mobile-btn">
                            <div class="text-xl">🎲</div>
                            <div class="text-xs">开始</div>
                        </button>
                    </div>
                    
                    <!-- 游戏状态 -->
                    <div class="text-center">
                        <p id="gameStatus" class="text-white text-sm">🎮 选择代币并授权开始游戏</p>
                    </div>
                </div>
            </div>

            <!-- 快捷操作 - 手机优化 -->
            <div class="bg-white/10 rounded-xl p-2 mt-2">
                <div class="flex gap-1">
                    <button onclick="location.reload()" class="mobile-btn flex-1 bg-gray-600 hover:bg-gray-700 text-white font-bold py-2 rounded text-xs">
                        🔄
                    </button>
                    <button onclick="forceEnable()" class="mobile-btn flex-1 bg-red-600 hover:bg-red-700 text-white font-bold py-2 rounded text-xs">
                        ⚡
                    </button>
                    <button onclick="showWalletInfo()" class="mobile-btn flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 rounded text-xs">
                        👤
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 配置
        const CONTRACTS = {
            WHEEL_GAME: '0xB677DBcA76061E6301272c83179c8243A4eeB6A5',
            MAO_TOKEN: '0x22f49bcb3dad370a9268ba3fca33cb037ca3d022',
            PI_TOKEN: '0xfd4680e25e05b3435c7f698668d1ce80d2a9f444'
        };

        // 全局变量
        let provider, signer, account;
        let selectedToken = 'MAO';
        let contracts = {};
        let isSpinning = false;
        let approvalStatus = { MAO: false, PI: false };

        // ABI
        const WHEEL_ABI = ["function playMAOGame() external", "function playPIGame() external"];
        const TOKEN_ABI = ["function approve(address spender, uint256 amount) returns (bool)", "function allowance(address owner, address spender) view returns (uint256)"];

        // 防止移动端双击缩放
        let lastTouchEnd = 0;
        document.addEventListener('touchend', function (event) {
            const now = (new Date()).getTime();
            if (now - lastTouchEnd <= 300) {
                event.preventDefault();
            }
            lastTouchEnd = now;
        }, false);

        // 更新连接状态指示器
        function updateConnectionIndicator(connected) {
            const indicator = document.getElementById('connectionIndicator');
            if (connected) {
                indicator.classList.add('connected');
                indicator.title = '✅ 已连接';
            } else {
                indicator.classList.remove('connected');
                indicator.title = '❌ 未连接';
            }
        }

        // 显示钱包信息
        function showWalletInfo() {
            if (account) {
                alert(`💼 钱包信息:\n地址: ${account.slice(0, 6)}...${account.slice(-4)}\n网络: AlveyChain\n状态: 已连接`);
            } else {
                alert('❌ 钱包未连接');
            }
        }

        // 强制启用游戏按钮
        function forceEnable() {
            const btn = document.getElementById('spinBtn');
            btn.disabled = false;
            btn.className = 'spin-btn w-20 h-20 rounded-full text-white font-bold mobile-btn';
            btn.innerHTML = '<div class="text-xl">🎲</div><div class="text-xs">开始</div>';
            document.getElementById('gameStatus').textContent = '🔧 强制启用 - 可以游戏';
            // 移动端友好的提示
            if ('vibrate' in navigator) {
                navigator.vibrate(100);
            }
        }

        // 连接钱包 - 移动端优化版
        async function connectWallet() {
            try {
                const btn = document.getElementById('connectBtn');
                btn.textContent = '连接中...';
                btn.disabled = true;

                if (!window.ethereum) {
                    alert('请使用Web3钱包浏览器！\n推荐：TP钱包、Trust Wallet、MetaMask');
                    resetConnectButton();
                    return;
                }

                // 请求连接
                const accounts = await window.ethereum.request({
                    method: 'eth_requestAccounts'
                });

                if (!accounts.length) {
                    throw new Error('没有账户');
                }

                account = accounts[0];
                provider = new ethers.providers.Web3Provider(window.ethereum);
                signer = provider.getSigner();

                // 检查网络
                const network = await provider.getNetwork();
                if (network.chainId !== 3797) {
                    await switchNetwork();
                }

                // 初始化合约
                contracts = {
                    wheel: new ethers.Contract(CONTRACTS.WHEEL_GAME, WHEEL_ABI, signer),
                    mao: new ethers.Contract(CONTRACTS.MAO_TOKEN, TOKEN_ABI, signer),
                    pi: new ethers.Contract(CONTRACTS.PI_TOKEN, TOKEN_ABI, signer)
                };

                // 显示连接成功
                document.getElementById('walletConnect').style.display = 'none';
                document.getElementById('gameArea').style.display = 'flex';
                document.getElementById('gameArea').style.flexDirection = 'column';
                updateConnectionIndicator(true);

                // 移动端震动反馈
                if ('vibrate' in navigator) {
                    navigator.vibrate([100, 50, 100]);
                }

                // 检查授权
                await checkApproval();

                console.log('✅ 连接成功');

            } catch (error) {
                console.error('连接失败:', error);
                alert('连接失败: ' + error.message);
                resetConnectButton();
            }
        }

        // 重置连接按钮
        function resetConnectButton() {
            const btn = document.getElementById('connectBtn');
            btn.textContent = '🔗 连接钱包开始游戏';
            btn.disabled = false;
            updateConnectionIndicator(false);
        }

        // 切换网络
        async function switchNetwork() {
            try {
                await window.ethereum.request({
                    method: 'wallet_switchEthereumChain',
                    params: [{ chainId: '0xED5' }]
                });
            } catch (error) {
                if (error.code === 4902) {
                    await window.ethereum.request({
                        method: 'wallet_addEthereumChain',
                        params: [{
                            chainId: '0xED5',
                            chainName: 'AlveyChain Mainnet',
                            nativeCurrency: { name: 'ALV', symbol: 'ALV', decimals: 18 },
                            rpcUrls: ['https://elves-core1.alvey.io'],
                            blockExplorerUrls: ['https://alveyscan.com']
                        }]
                    });
                }
            }
        }

        // 选择代币
        function selectToken(token) {
            selectedToken = token;
            
            // 更新按钮
            document.getElementById('maoBtn').className = token === 'MAO' ? 
                'mobile-btn flex-1 bg-blue-600 text-white py-2 rounded-lg font-bold text-sm' : 
                'mobile-btn flex-1 bg-gray-600 text-white py-2 rounded-lg font-bold text-sm';
            document.getElementById('piBtn').className = token === 'PI' ? 
                'mobile-btn flex-1 bg-purple-600 text-white py-2 rounded-lg font-bold text-sm' : 
                'mobile-btn flex-1 bg-gray-600 text-white py-2 rounded-lg font-bold text-sm';

            // 更新授权按钮
            document.getElementById('approveBtn').innerHTML = `🔓 授权 ${token}`;
            
            // 更新转盘中心显示
            document.querySelector('#wheel .absolute.top-1\\/2').textContent = token;
            
            // 移动端震动反馈
            if ('vibrate' in navigator) {
                navigator.vibrate(50);
            }
            
            // 重新检查授权
            if (contracts.mao && contracts.pi) {
                checkApproval();
            }
        }

        // 检查授权
        async function checkApproval() {
            try {
                const contract = selectedToken === 'MAO' ? contracts.mao : contracts.pi;
                const allowance = await contract.allowance(account, CONTRACTS.WHEEL_GAME);
                
                const required = selectedToken === 'MAO' ? 
                    ethers.utils.parseUnits('100', 18) : 
                    ethers.utils.parseUnits('10000', 18);

                const approved = allowance.gte(required);
                approvalStatus[selectedToken] = approved;
                
                updateApprovalStatus(approved);

            } catch (error) {
                console.error('检查授权失败:', error);
                approvalStatus[selectedToken] = false;
                updateApprovalStatus(false);
            }
        }

        // 更新授权状态 - 优化版
        function updateApprovalStatus(approved) {
            const approveSection = document.getElementById('approvalSection');
            const spinBtn = document.getElementById('spinBtn');
            const gameStatus = document.getElementById('gameStatus');

            if (approved) {
                // 授权成功后隐藏授权区域
                approveSection.style.display = 'none';
                
                spinBtn.disabled = false;
                spinBtn.className = 'spin-btn w-20 h-20 rounded-full text-white font-bold mobile-btn';
                gameStatus.textContent = '🎯 点击🎲开始游戏！';
            } else {
                // 显示授权区域
                approveSection.style.display = 'block';
                const approveBtn = document.getElementById('approveBtn');
                approveBtn.textContent = `🔓 授权 ${selectedToken}`;
                approveBtn.disabled = false;
                approveBtn.className = 'mobile-btn w-full bg-orange-600 hover:bg-orange-700 text-white font-bold py-2 rounded-xl text-sm';
                
                spinBtn.disabled = true;
                spinBtn.className = 'spin-btn w-20 h-20 rounded-full text-white font-bold disabled:opacity-50 mobile-btn';
                gameStatus.textContent = '🔓 请先授权代币';
            }
        }

        // 授权
        async function approve() {
            try {
                const btn = document.getElementById('approveBtn');
                btn.textContent = '授权中...';
                btn.disabled = true;

                const contract = selectedToken === 'MAO' ? contracts.mao : contracts.pi;
                const tx = await contract.approve(CONTRACTS.WHEEL_GAME, ethers.constants.MaxUint256);
                
                await tx.wait();

                // 移动端震动反馈
                if ('vibrate' in navigator) {
                    navigator.vibrate([200, 100, 200]);
                }

                await checkApproval();

            } catch (error) {
                console.error('授权失败:', error);
                alert('授权失败: ' + error.message);
                // 恢复按钮状态
                const btn = document.getElementById('approveBtn');
                btn.textContent = `🔓 授权 ${selectedToken}`;
                btn.disabled = false;
            }
        }

        // 开始游戏 - 移动端优化
        async function spin() {
            if (isSpinning) return;

            try {
                // 检查授权状态
                if (!approvalStatus[selectedToken]) {
                    alert('请先授权代币！');
                    return;
                }

                isSpinning = true;
                const wheel = document.getElementById('wheel');
                const btn = document.getElementById('spinBtn');
                const status = document.getElementById('gameStatus');

                // 按钮状态
                btn.innerHTML = '<div class="text-xl">⏳</div><div class="text-xs">游戏中</div>';
                btn.disabled = true;
                status.textContent = '🎰 转盘旋转中...';

                // 移动端震动反馈
                if ('vibrate' in navigator) {
                    navigator.vibrate(200);
                }

                // 转盘动画
                const rotation = 1800 + Math.random() * 1800;
                wheel.style.transition = 'transform 3s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
                wheel.style.transform = `rotate(${rotation}deg)`;

                // 调用合约
                const method = selectedToken === 'MAO' ? 'playMAOGame' : 'playPIGame';
                const tx = await contracts.wheel[method]();

                status.textContent = '⏳ 等待确认...';
                const receipt = await tx.wait();

                // 游戏完成震动
                if ('vibrate' in navigator) {
                    navigator.vibrate([100, 50, 100, 50, 100]);
                }

                status.textContent = '🎯 游戏完成！';
                console.log('游戏完成:', receipt.transactionHash);

            } catch (error) {
                console.error('游戏失败:', error);
                let errorMsg = '游戏失败: ';
                if (error.message.includes('insufficient funds')) {
                    errorMsg += '代币余额不足';
                } else if (error.message.includes('user rejected')) {
                    errorMsg += '用户取消交易';
                } else {
                    errorMsg += error.message;
                }
                alert(errorMsg);
            } finally {
                isSpinning = false;
                // 恢复按钮状态
                if (approvalStatus[selectedToken]) {
                    const btn = document.getElementById('spinBtn');
                    btn.innerHTML = '<div class="text-xl">🎲</div><div class="text-xs">开始</div>';
                    btn.disabled = false;
                    btn.className = 'spin-btn w-20 h-20 rounded-full text-white font-bold mobile-btn';
                    if (document.getElementById('gameStatus').textContent.includes('游戏中') || document.getElementById('gameStatus').textContent.includes('等待')) {
                        document.getElementById('gameStatus').textContent = '🎯 点击🎲开始游戏！';
                    }
                } else {
                    await checkApproval();
                }
            }
        }

        // 监听账户变化
        if (window.ethereum) {
            window.ethereum.on('accountsChanged', (accounts) => {
                if (accounts.length === 0) {
                    updateConnectionIndicator(false);
                    location.reload();
                } else if (accounts[0] !== account) {
                    location.reload();
                }
            });

            window.ethereum.on('chainChanged', () => {
                location.reload();
            });
        }

        // 页面加载完成后检查是否已连接
        window.addEventListener('load', async () => {
            updateConnectionIndicator(false);
            if (window.ethereum) {
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_accounts' });
                    if (accounts.length > 0) {
                        // 检测到已连接的账户，自动连接
                        setTimeout(connectWallet, 500);
                    }
                } catch (error) {
                    console.log('自动连接检查失败:', error);
                }
            }
        });
    </script>
</body>
</html>
